{% extends "base.html" %}

{% block title %}Login - Workout Remixer{% endblock %}

{% block internal_css %}
<style>
    body {
        background: linear-gradient(135deg, #0f0f0f 0%, #1a1a1a 100%);
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        min-height: 100vh;
    }
    
    :root { 
        --red: #D6361A;
        --orange: #EB8315;
        --lime: #A4C628;
    }
    
    .login-container {
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
    }
    
    .login-card {
        background: linear-gradient(135deg, #1e1e1e 0%, #252525 100%);
        border: 1px solid #333;
        border-radius: 20px;
        padding: 3rem;
        width: 100%;
        max-width: 450px;
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
    }
    
    .login-header {
        text-align: center;
        margin-bottom: 2rem;
    }
    
    .login-logo {
        font-size: 1.5rem;
        font-weight: 700;
        background: linear-gradient(135deg, var(--orange), var(--red));
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        margin-bottom: 1rem;
    }
    
    .login-title {
        font-size: 2rem;
        font-weight: 700;
        color: #fff;
        margin: 0;
    }
    
    .login-subtitle {
        color: #aaa;
        font-size: 0.9rem;
        margin-top: 0.5rem;
    }
    
    .form-group {
        margin-bottom: 1.5rem;
    }
    
    .form-label {
        display: block;
        color: #aaa;
        font-size: 0.85rem;
        font-weight: 600;
        margin-bottom: 0.5rem;
        text-transform: uppercase;
        letter-spacing: 0.5px;
    }
    
    .form-input {
        background: rgba(42, 42, 42, 0.8);
        border: 1px solid #444;
        border-radius: 8px;
        padding: 12px 16px;
        color: #fff;
        font-size: 1rem;
        width: 100%;
        transition: all 0.3s ease;
    }
    
    .form-input::placeholder {
        color: #666;
    }
    
    .form-input:focus {
        outline: none;
        border-color: var(--lime);
        background: rgba(42, 42, 42, 1);
        box-shadow: 0 0 12px rgba(164, 198, 40, 0.2);
    }
    
    .btn-login {
        background: linear-gradient(135deg, var(--lime), #91B623);
        border: none;
        border-radius: 8px;
        padding: 12px 24px;
        color: #000;
        font-weight: 700;
        font-size: 0.95rem;
        cursor: pointer;
        width: 100%;
        transition: all 0.3s ease;
        text-transform: uppercase;
        letter-spacing: 0.5px;
    }
    
    .btn-login:hover {
        transform: translateY(-2px);
        box-shadow: 0 4px 12px rgba(164, 198, 40, 0.4);
    }
    
    .login-footer {
        text-align: center;
        margin-top: 1.5rem;
        color: #aaa;
        font-size: 0.9rem;
    }
    
    .login-footer a {
        color: var(--lime);
        text-decoration: none;
        font-weight: 600;
        transition: all 0.3s ease;
    }
    
    .login-footer a:hover {
        color: var(--orange);
    }
</style>
{% endblock %}

{% block content %}
<div class="login-container">
    <div class="login-card">
        <!-- Header -->
        <div class="login-header">
            <div class="login-logo">🏋️ Workout Remixer</div>
            <h1 class="login-title">Welcome Back</h1>
            <p class="login-subtitle">Sign in to your account</p>
        </div>

        <!-- Form -->
        <form action="{{ url_for('login_view') }}" method="POST">
            <div class="form-group">
                <label class="form-label">Username</label>
                <input type="text" class="form-input" name="username" placeholder="Enter your username" required>
            </div>

            <div class="form-group">
                <label class="form-label">Password</label>
                <input type="password" class="form-input" name="password" placeholder="Enter your password" required>
            </div>

            <button type="submit" class="btn-login">Sign In</button>
        </form>

        <!-- Footer -->
        <div class="login-footer">
            Don't have an account? <a href="{{ url_for('register_view') }}">Create one here</a>
        </div>
    </div>
</div>
{% endblock %}
